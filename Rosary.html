<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Test Website</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 0; background:#0b1220; color:#e8eefc; }
    header { padding: 48px 20px; text-align:center; background: linear-gradient(180deg,#111a33,#0b1220); }
    .card { max-width: 720px; margin: 24px auto; padding: 20px; background:#121a34; border-radius: 12px; }
    a { color: #7dd3fc; }
    code { background:#0f1730; padding:2px 6px; border-radius:6px; }
    button { background:#2563eb; color:white; border:0; padding:10px 14px; border-radius:10px; cursor:pointer; }
    button:hover { background:#1d4ed8; }
  </style>
</head>
<body>
  <header>
    <h1>✅ Test Website (GitHub Pages)</h1>
    <p>This is a free, public HTML site.</p>
  </header>

  <main class="card">
    <h2>What you can do</h2>
    <ul>
      <li>Edit this <code>index.html</code> and push changes</li>
      <li>Add more files (CSS, images, JS)</li>
      <li>Check updates live via the Pages URL</li>
    </ul>

    <p>Example link: <a href="https://example.com" target="_blank" rel="noreferrer">example.com</a></p>

    <button type="button" onclick="alert('Hello from GitHub Pages!')">
      Click me
    </button>
  </main>
</body>
</html>
